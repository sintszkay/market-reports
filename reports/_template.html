<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title><!-- DATA: report_title --></title>
  <style>
    :root{--bg:#f5f5f7;--panel:#fff;--text:#111827;--muted:#667085;--line:#e5e7eb;--blue:#007aff;--green:#18864b;--amber:#a86600;--red:#c9342f;--shadow:0 18px 48px rgba(15,23,42,.08)}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#fbfbfd 0,var(--bg) 300px);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei","PingFang TC",Arial,sans-serif;line-height:1.58}.wrap{max-width:1160px;margin:0 auto;padding:32px 16px 52px}header{background:rgba(255,255,255,.92);border:1px solid rgba(255,255,255,.8);border-radius:18px;box-shadow:var(--shadow);padding:24px;margin-bottom:18px}.eyebrow{font-size:13px;font-weight:800;color:var(--blue);margin-bottom:8px}h1{font-size:32px;line-height:1.2;margin:0}h2{font-size:23px;margin:30px 0 12px}h3{font-size:18px;margin:20px 0 8px}.muted,.note{color:var(--muted)}.note{font-size:13px}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin:18px 0}.card,.check{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 15px;box-shadow:0 8px 20px rgba(15,23,42,.04)}.card span,.check span{display:block;color:var(--muted);font-size:12px;font-weight:800}.card strong{display:block;margin-top:4px;font-size:18px;line-height:1.25}.badge{display:inline-flex;border-radius:999px;padding:5px 10px;font-size:13px;font-weight:800}.amber{color:var(--amber);background:#fff7ed}.blue{color:var(--blue);background:#eff6ff}.green{color:var(--green);background:#ecfdf3}.red{color:var(--red);background:#fff1f1}table{width:100%;border-collapse:separate;border-spacing:0;background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin:10px 0 12px;font-size:14px;box-shadow:0 8px 20px rgba(15,23,42,.04)}th,td{border-bottom:1px solid var(--line);padding:9px 11px;text-align:left;vertical-align:top}tr:last-child td{border-bottom:0}th{background:#f8fafc;color:#334155;font-weight:800}.num{text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}ol{padding-left:22px}li{margin:7px 0}.callout{background:#fff;border:1px solid var(--line);border-left:5px solid var(--blue);border-radius:12px;padding:14px 16px;margin:12px 0 18px}.risk{border-left-color:var(--red)}.warn{border-left-color:var(--amber)}.ok{border-left-color:var(--green)}.checks{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:12px 0}.check strong{display:block;margin-top:4px}.check.low{border-left:4px solid var(--green)}.check.mid{border-left:4px solid var(--amber)}.check.high{border-left:4px solid var(--red)}
    .action-directive{border-left:3px solid var(--amber);background:#FAF6EE;padding:12px 16px;margin-top:20px;border-radius:0}
    .action-directive--positioning{border-left-width:4px;padding:16px 20px}
    .ad-label{display:inline-block;color:var(--amber);font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase}
    .action-directive--positioning .ad-label{font-weight:600}
    .ad-list{list-style:none;padding:0;margin:10px 0 0}
    .ad-list li{position:relative;margin:6px 0;padding-left:22px}
    .ad-list li::before{position:absolute;left:0;top:0;font-weight:700}
    .ad-primary{color:var(--text);font-weight:600}.ad-primary::before{content:"●";color:var(--amber)}
    .ad-condition{color:#4b5563}.ad-condition::before{content:"◐";color:var(--amber)}
    .ad-secondary{color:#4b5563}.ad-secondary::before{content:"◐";color:var(--amber)}
    .ad-watch{color:var(--text)}.ad-watch::before{content:"◆";color:var(--blue)}
    .ad-avoid{color:var(--muted)}.ad-avoid::before{content:"✗";color:var(--red)}
    @media(max-width:900px){.grid,.checks{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:640px){.wrap{padding:20px 12px 40px}header{padding:18px;border-radius:16px}h1{font-size:26px}.grid,.checks{grid-template-columns:1fr}table{display:block;overflow-x:auto;white-space:nowrap}}
  </style>
</head>
